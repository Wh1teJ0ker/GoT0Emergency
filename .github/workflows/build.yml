# GoT0Emergency 自动构建和发布工作流
#
# 功能：
# - 支持多平台自动构建（Windows/Linux/macOS）
# - 打 tag (v*) 时自动创建 GitHub Release
# - 手动触发构建（workflow_dispatch）
# - 缓存依赖以加速构建
#
# 触发条件：
# - push 到 main/master 分支
# - 创建 v* 格式的 tag（如 v1.0.0）
# - 手动在 Actions 页面点击运行
#
# 输出平台：
# - Windows AMD64: JAttack-windows-amd64.exe
# - Linux AMD64: JAttack-linux-amd64
# - macOS Universal: JAttack-macos-universal.zip

name: Wails Build

permissions:
  contents: write

on:
  push:
    tags:
      - "v*"
    branches:
      - main
      - master
  workflow_dispatch:

env:
  GO_VERSION: stable
  NODE_VERSION: '20'

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux/amd64
            output: JAttack-linux-amd64
          - os: windows-latest
            platform: windows/amd64
            output: JAttack-windows-amd64.exe
          - os: macos-latest
            platform: darwin/universal
            output: JAttack-macos-universal.zip
            is_mac: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Linux Dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev

      - name: Build Application
        shell: bash
        run: |
          wails build \
            -platform ${{ matrix.platform }} \
            -o ${{ matrix.output }} \
            -clean \
            -ldflags "-s -w"

      - name: Process macOS Artifact
        if: matrix.is_mac
        run: |
          cd build/bin
          ditto -c -k --keepParent JAttack.app ${{ matrix.output }}
          rm -rf JAttack.app

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: build/bin/${{ matrix.output }}

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Display downloaded files
        run: ls -R dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# GoT0Emergency 自动构建工作流
#
# 功能：
# - 在每次 push 到 main 分支或创建 PR 时自动触发
# - 使用 Windows 环境构建 Wails 桌面应用
# - 缓存 Go modules 和 Node.js 依赖以加速构建
# - 自动上传构建产物（exe）到 GitHub Artifacts
#
# 使用方法：
# - 本地先执行 wails build 确保编译通过
# - 推送到 GitHub 后自动运行
# - 构建产物可在 Actions 页面下载（保留 30 天）

name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: true
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Build with Wails
        run: wails build

      - name: Verify build output
        run: |
          if (Test-Path "build\bin\GoT0Emergency.exe") {
            echo "Build successful! Executable created."
          } else {
            echo "Build failed! Executable not found."
            exit 1
          }

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: GoT0Emergency-windows
          path: build/bin/GoT0Emergency.exe
          retention-days: 30
